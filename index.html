<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sophie Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f4f4;
}

/* HEADER */
header{
background:#6a0dad;
color:white;
padding:12px 20px;
display:flex;
align-items:center;
justify-content:flex-start;
gap:15px;
}

header img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
}

header h1{
margin:0;
font-size:26px;
letter-spacing:1px;
font-weight:700;
}

/* BUSCADOR */
.filtros{
background:white;
padding:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

input,select{
padding:8px;
border-radius:8px;
border:1px solid #ccc;
}

/* PRODUCTOS */
#productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:15px;
padding:15px;
}

.producto{
background:white;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
overflow:hidden;
display:flex;
flex-direction:column;
}

.producto img{
width:100%;
height:180px;
object-fit:contain;
background:white;
}

.info{
padding:10px;
}

.info h3{
margin:5px 0;
font-size:18px;
}

.categoria{
font-size:13px;
color:gray;
}

.precio{
font-weight:bold;
margin-top:5px;
}

.btn-agregar{
margin-top:8px;
background:#6a0dad;
color:white;
border:none;
padding:8px;
border-radius:8px;
cursor:pointer;
}

/* CELULAR */
@media(max-width:600px){
.producto{
flex-direction:row;
height:140px;
}
.producto img{
width:40%;
height:100%;
}
.info{
width:60%;
font-size:13px;
}
}

/* CARRITO */
.carrito-btn{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
border:none;
padding:15px;
border-radius:50%;
font-size:20px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.carrito-panel{
position:fixed;
right:-100%;
top:0;
width:100%;
max-width:400px;
height:100%;
background:white;
box-shadow:-5px 0 15px rgba(0,0,0,0.2);
transition:0.4s;
padding:20px;
overflow-y:auto;
}

.carrito-panel.activo{
right:0;
}

.total{
font-size:20px;
font-weight:bold;
margin-top:15px;
}

.btn-confirmar{
background:#25D366;
color:white;
padding:10px;
border:none;
border-radius:10px;
margin-top:10px;
cursor:pointer;
width:100%;
}

</style>
</head>
<body>

<header>
<img src="https://github.com/kaysita26/tienda/raw/main/imagenes/LOGO%20SOPHIE%20STORE.jpeg">
<h1>SOPHIE STORE</h1>
</header>

<div class="filtros">
<input type="text" id="buscar" placeholder="Buscar..." onkeyup="filtrar()">
<select id="categoria" onchange="filtrar()">
<option value="">Todas</option>
</select>
</div>

<div id="productos"></div>

<button class="carrito-btn" onclick="abrirCarrito()">🛒</button>

<div class="carrito-panel" id="carritoPanel">
<h2>Tu Pedido</h2>
<div id="listaCarrito"></div>

<div class="total">
Total: S/. <span id="total">0.00</span>
</div>

<input type="text" id="nombreCliente" placeholder="Tu nombre">
<input type="tel" id="celCliente" placeholder="Tu celular">

<button class="btn-confirmar" onclick="confirmarPedido()">Confirmar Pedido</button>
</div>

<script>

let urlCSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8uMFvOEq09EXVbg6YxPa1lhGndcrwD-ELRkxRQVsiG4Tjb646vPzGPcuHP4CD_EZ-F7da5BonXwt3/pub?gid=1913233787&single=true&output=csv";

let productos=[];
let carrito=[];

fetch(urlCSV)
.then(res=>res.text())
.then(data=>{
let filas=data.split("\n").slice(1);
filas.forEach((fila,index)=>{
let col=fila.split(",");
if(col.length>=7){

let p={
nombre:col[0],
precioUnidad:parseFloat(col[2]),
precioMayor:parseFloat(col[3]),
minMayor:parseInt(col[4]),
imagen:col[5],
categoria:col[6]
};

productos.push(p);

if(!document.getElementById("categoria").innerHTML.includes(p.categoria)){
document.getElementById("categoria").innerHTML+=`<option>${p.categoria}</option>`;
}

document.getElementById("productos").innerHTML+=`
<div class="producto" data-nombre="${p.nombre.toLowerCase()}" data-cat="${p.categoria}">
<img src="${p.imagen}">
<div class="info">
<h3>${p.nombre}</h3>
<div class="categoria">${p.categoria}</div>
<div class="precio">Unidad: S/. ${p.precioUnidad.toFixed(2)}</div>
<input type="number" min="1" value="1" id="cant${index}">
<button class="btn-agregar" onclick="agregarCarrito(${index})">Agregar al carrito</button>
</div>
</div>`;
}
});
});

function agregarCarrito(index){
let cantidad=parseInt(document.getElementById("cant"+index).value);
let p=productos[index];

let precio=cantidad>=p.minMayor?p.precioMayor:p.precioUnidad;

let subtotal=cantidad*precio;

carrito.push({
nombre:p.nombre,
cantidad:cantidad,
subtotal:subtotal
});

actualizarCarrito();
}

function actualizarCarrito(){
let lista="";
let total=0;

carrito.forEach((p,i)=>{
total+=p.subtotal;
lista+=`<p>${p.nombre} x${p.cantidad} - S/. ${p.subtotal.toFixed(2)}</p>`;
});

document.getElementById("listaCarrito").innerHTML=lista;
document.getElementById("total").innerText=total.toFixed(2);
}

function abrirCarrito(){
document.getElementById("carritoPanel").classList.toggle("activo");
}

function confirmarPedido(){

let nombre=document.getElementById("nombreCliente").value.trim();
let cel=document.getElementById("celCliente").value.trim();

if(nombre==="" || cel===""){
alert("Debes ingresar nombre y celular");
return;
}

if(carrito.length===0){
alert("Agrega productos primero");
return;
}

if(!confirm("¿Confirmas tu pedido?")){
return;
}

let mensaje="Hola, soy "+nombre+"%0A";
mensaje+="Mi número es: "+cel+"%0A%0A";
mensaje+="Pedido:%0A";

let total=0;

carrito.forEach(p=>{
mensaje+=`- ${p.nombre} x${p.cantidad} = S/. ${p.subtotal.toFixed(2)}%0A`;
total+=p.subtotal;
});

mensaje+="%0ATotal: S/. "+total.toFixed(2);

window.open("https://wa.me/51992044102?text="+mensaje);

}

function filtrar(){
let texto=document.getElementById("buscar").value.toLowerCase();
let categoria=document.getElementById("categoria").value;
let cards=document.querySelectorAll(".producto");

cards.forEach(card=>{
let nombre=card.getAttribute("data-nombre");
let cat=card.getAttribute("data-cat");

let mostrar=true;

if(texto && !nombre.includes(texto)) mostrar=false;
if(categoria && cat!=categoria) mostrar=false;

card.style.display=mostrar?"block":"none";
});
}

</script>

</body>
</html>
