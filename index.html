<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tienda Online</title>

<style>
body{
font-family: Arial;
background:#f4f6f9;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.productos{
display:grid;
grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

button{
background:#25D366;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
margin-top:10px;
width:100%;
}

button:hover{
background:#1ebe5d;
}

input{
width:60px;
text-align:center;
}

.total{
margin-top:20px;
font-size:18px;
text-align:right;
}
</style>
</head>
<body>

<h1>Mi Tienda</h1>

<div id="productos" class="productos"></div>

<div class="total">
Total: S/ <span id="total">0</span>
<br><br>
<button onclick="enviarPedido()">Enviar Pedido por WhatsApp</button>
</div>

<script>

const whatsapp = "51992044102";

const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8uMFvOEq09EXVbg6YxPa1lhGndcrwD-ELRkxRQVsiG4Tjb646vPzGPcuHP4CD_EZ-F7da5BonXwt3/pub?output=csv";

let carrito = [];
let total = 0;

fetch(csvURL)
.then(response => response.text())
.then(data => {

const filas = data.trim().split("\n").slice(1);

filas.forEach(fila => {

const columnas = fila.split(",");

if(columnas.length < 6) return;

const nombre = columnas[0];
const marca = columnas[1];
const precioUnidad = parseFloat(columnas[2]);
const precioMayor = parseFloat(columnas[3]);
const minMayor = parseInt(columnas[4]);
const imagen = columnas[5];

const contenedor = document.getElementById("productos");

const card = document.createElement("div");
card.className="card";

card.innerHTML = `
<img src="${imagen}" alt="">
<h3>${nombre}</h3>
<p><b>Marca:</b> ${marca}</p>
<p>Unidad: S/ ${precioUnidad}</p>
<p>Mayor (desde ${minMayor}): S/ ${precioMayor}</p>
<input type="number" min="0" value="0" id="cant-${nombre}">
<button onclick="agregar('${nombre}',${precioUnidad},${precioMayor},${minMayor})">
Agregar
</button>
`;

contenedor.appendChild(card);

});

});

function agregar(nombre,precioU,precioM,minM){

const cantidad = parseInt(document.getElementById("cant-"+nombre).value);

if(!cantidad || cantidad<=0) return;

let precioFinal = cantidad >= minM ? precioM : precioU;
let subtotal = cantidad * precioFinal;

carrito.push({nombre,cantidad,subtotal});
total += subtotal;

document.getElementById("total").innerText = total.toFixed(2);
}

function enviarPedido(){

if(carrito.length===0){
alert("No hay productos en el pedido");
return;
}

let mensaje="Hola, quiero pedir:%0A";

carrito.forEach(p=>{
mensaje += `- ${p.nombre} x${p.cantidad} = S/ ${p.subtotal}%0A`;
});

mensaje += `%0ATotal: S/ ${total.toFixed(2)}`;

window.open(`https://wa.me/${whatsapp}?text=${mensaje}`);
}

</script>

</body>
</html>
