<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mi Tienda</title>

<style>
body{
font-family: Arial;
background:#f4f6f9;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.productos{
display:grid;
grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

input{
width:60px;
text-align:center;
margin-top:5px;
}

button{
background:#25D366;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
margin-top:10px;
width:100%;
}

button:hover{
background:#1ebe5d;
}

.total{
margin-top:30px;
font-size:20px;
text-align:right;
font-weight:bold;
}
</style>
</head>

<body>

<h1>Mi Tienda Online</h1>

<div id="productos" class="productos"></div>

<div class="total">
Total: S/ <span id="total">0.00</span>
<br><br>
<button onclick="enviarPedido()">Enviar Pedido por WhatsApp</button>
</div>

<script>

const whatsapp = "51992044102";

const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8uMFvOEq09EXVbg6YxPa1lhGndcrwD-ELRkxRQVsiG4Tjb646vPzGPcuHP4CD_EZ-F7da5BonXwt3/pub?output=csv";

let carrito = {};
let total = 0;

fetch(csvURL)
.then(response => response.text())
.then(data => {

const filas = data.trim().split("\n");
filas.shift(); // quitar encabezado

filas.forEach((fila, index) => {

const columnas = fila.split(",");

if(columnas.length < 6) return;

const nombre = columnas[0];
const marca = columnas[1];
const precioUnidad = parseFloat(columnas[2]);
const precioMayor = parseFloat(columnas[3]);
const minMayor = parseInt(columnas[4]);
const imagen = columnas[5];

const idCantidad = "cantidad_" + index;

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<img src="${imagen}" alt="">
<h3>${nombre}</h3>
<p><b>Marca:</b> ${marca}</p>
<p>Unidad: S/ ${precioUnidad}</p>
<p>Mayor desde ${minMayor}: S/ ${precioMayor}</p>
<input type="number" min="0" value="0" id="${idCantidad}">
<button onclick="agregarProducto('${idCantidad}','${nombre}',${precioUnidad},${precioMayor},${minMayor})">
Agregar
</button>
`;

document.getElementById("productos").appendChild(card);

});

});

function agregarProducto(id,nombre,precioU,precioM,minM){

const cantidad = parseInt(document.getElementById(id).value);

if(!cantidad || cantidad <= 0){
alert("Ingresa una cantidad válida");
return;
}

let precioFinal = cantidad >= minM ? precioM : precioU;
let subtotal = cantidad * precioFinal;

carrito[nombre] = {
cantidad: cantidad,
subtotal: subtotal
};

calcularTotal();
}

function calcularTotal(){

total = 0;

for(let producto in carrito){
total += carrito[producto].subtotal;
}

document.getElementById("total").innerText = total.toFixed(2);
}

function enviarPedido(){

if(Object.keys(carrito).length === 0){
alert("No hay productos en el pedido");
return;
}

let mensaje = "Hola, quiero pedir:%0A";

for(let producto in carrito){
mensaje += `- ${producto} x${carrito[producto].cantidad} = S/ ${carrito[producto].subtotal}%0A`;
}

mensaje += `%0ATotal: S/ ${total.toFixed(2)}`;

window.open(`https://wa.me/${whatsapp}?text=${mensaje}`);
}

</script>

</body>
</html>
