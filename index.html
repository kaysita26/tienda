<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sophie Store</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f4f4f4;
}

header{
  background:#000;
  color:white;
  text-align:center;
  padding:15px;
}

header img{
  height:70px;
  margin-bottom:10px;
  object-fit:contain;
}

header h1{
  margin:0;
  font-size:22px;
}

.controles{
  text-align:center;
  padding:15px;
}

input, select{
  padding:10px;
  margin:5px;
  width:220px;
  max-width:90%;
  border-radius:8px;
  border:1px solid #ccc;
}

#productos{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(230px,1fr));
  gap:15px;
  padding:15px;
}

.producto{
  background:white;
  padding:12px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  transition:0.2s;
}

.producto:hover{
  transform:scale(1.02);
}

.producto img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:10px;
}

.producto h4{
  margin:8px 0 5px;
}

.producto p{
  margin:3px 0;
  font-size:14px;
}

input[type="number"]{
  width:70px;
}

#total{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  margin:15px;
}

.boton-principal{
  display:block;
  margin:15px auto;
  padding:12px 25px;
  background:#25D366;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

.boton-principal:hover{
  background:#1ebe5d;
}

.whatsapp-float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  font-size:28px;
  padding:15px;
  border-radius:50%;
  text-decoration:none;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<header>
  <img src="https://raw.githubusercontent.com/kaysita26/tienda/main/imagenes/LOGO%20SOPHIE%20STORE.jpeg">
  <h1>SOPHIE STORE</h1>
</header>

<div class="controles">
  <input type="text" id="buscador" placeholder="Buscar producto..." onkeyup="filtrar()">
  <select id="filtroMarca" onchange="filtrar()">
    <option value="">Todas las marcas</option>
  </select>
</div>

<div id="productos"></div>

<div id="total">Total: S/. 0.00</div>

<button class="boton-principal" onclick="enviarPedido()">Enviar Pedido</button>

<a class="whatsapp-float" href="https://wa.me/51992044102" target="_blank">💬</a>

<script>

let urlCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8uMFvOEq09EXVbg6YxPa1lhGndcrwD-ELRkxRQVsiG4Tjb646vPzGPcuHP4CD_EZ-F7da5BonXwt3/pub?gid=1913233787&single=true&output=csv";

let productos = [];
let carrito = [];

fetch(urlCSV)
.then(res => res.text())
.then(data => {

  let filas = data.split("\n").slice(1);
  let marcas = [];

  filas.forEach((fila,index) => {

    let columnas = fila.split(",");

    if(columnas.length >= 6){

      let producto = {
        nombre: columnas[0],
        marca: columnas[1],
        precioUnidad: parseFloat(columnas[2]),
        precioMayor: parseFloat(columnas[3]),
        minMayor: parseInt(columnas[4]),
        imagen: columnas[5]
      };

      productos.push(producto);

      if(!marcas.includes(producto.marca)){
        marcas.push(producto.marca);
        document.getElementById("filtroMarca").innerHTML += 
        `<option value="${producto.marca}">${producto.marca}</option>`;
      }

      document.getElementById("productos").innerHTML += `
        <div class="producto" data-nombre="${producto.nombre.toLowerCase()}" data-marca="${producto.marca}">
          <img src="${producto.imagen}">
          <h4>${producto.nombre}</h4>
          <p><strong>${producto.marca}</strong></p>
          <p>Unidad: S/. ${producto.precioUnidad.toFixed(2)}</p>
          <p>Mayor desde ${producto.minMayor}: S/. ${producto.precioMayor.toFixed(2)}</p>
          <input type="number" min="0" value="0" onchange="calcular(${index},this.value)">
        </div>
      `;
    }
  });

})
.catch(() => {
  alert("Error cargando productos. Verifica tu CSV.");
});

function filtrar(){
  let texto = document.getElementById("buscador").value.toLowerCase();
  let marca = document.getElementById("filtroMarca").value;
  let productosDiv = document.querySelectorAll(".producto");

  productosDiv.forEach(p=>{
    let nombre = p.dataset.nombre;
    let marcaProd = p.dataset.marca;

    let coincideNombre = nombre.includes(texto);
    let coincideMarca = marca=="" || marcaProd==marca;

    p.style.display = (coincideNombre && coincideMarca) ? "block" : "none";
  });
}

function calcular(index,cantidad){

  cantidad = parseInt(cantidad);

  if(isNaN(cantidad) || cantidad <= 0){
    carrito[index] = null;
    actualizarTotal();
    return;
  }

  let producto = productos[index];

  let precio = cantidad >= producto.minMayor 
               ? producto.precioMayor 
               : producto.precioUnidad;

  let subtotal = cantidad * precio;

  carrito[index] = {
    nombre: producto.nombre,
    cantidad: cantidad,
    subtotal: subtotal
  };

  actualizarTotal();
}

function actualizarTotal(){

  let total = 0;

  carrito.forEach(p=>{
    if(p) total += p.subtotal;
  });

  document.getElementById("total").innerHTML =
  "Total: S/. " + total.toFixed(2);
}

function enviarPedido(){

  let mensaje = "Hola, quiero pedir:%0A";
  let totalFinal = 0;

  carrito.forEach(p=>{
    if(p && p.cantidad > 0){
      mensaje += `- ${p.nombre} x${p.cantidad} = S/. ${p.subtotal.toFixed(2)}%0A`;
      totalFinal += p.subtotal;
    }
  });

  if(totalFinal === 0){
    alert("No has seleccionado productos");
    return;
  }

  mensaje += `%0ATotal: S/. ${totalFinal.toFixed(2)}`;

  window.open("https://wa.me/51992044102?text=" + mensaje);

  carrito = [];
  document.querySelectorAll("input[type='number']").forEach(i => i.value = 0);
  actualizarTotal();
}

</script>

</body>
</html>
