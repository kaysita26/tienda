<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sophie Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

/* HEADER */
header{
background:#6a0dad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

/* FILTROS */
.filtros{
padding:10px;
background:white;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

input,select{
padding:8px;
border-radius:8px;
border:1px solid #ccc;
}

/* PRODUCTOS */
#productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:15px;
padding:15px;
}

.producto{
background:white;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
overflow:hidden;
transition:0.3s;
}

.producto:hover{
transform:scale(1.02);
}

.producto img{
width:100%;
height:200px;
object-fit:cover;
}

.info{
padding:10px;
}

.info h3{
margin:5px 0;
font-size:16px;
}

.categoria{
font-size:12px;
color:gray;
margin-bottom:5px;
}

/* CARRITO APP */
.carrito-app{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
box-shadow:0 -4px 15px rgba(0,0,0,0.2);
padding:15px;
display:flex;
flex-direction:column;
align-items:center;
z-index:1000;
}

/* TOTAL CENTRADO */
.total{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
text-align:center;
width:100%;
}

/* BOTON WHATSAPP */
.btn-wsp{
background:#25D366;
color:white;
padding:12px 20px;
border:none;
border-radius:30px;
font-size:16px;
font-weight:bold;
cursor:pointer;
display:flex;
align-items:center;
gap:10px;
transition:0.3s;
}

.btn-wsp:hover{
background:#1ebe5d;
transform:scale(1.05);
}

.btn-wsp img{
width:22px;
}

/* ESPACIO PARA QUE NO TAPE PRODUCTOS */
.espacio{
height:120px;
}

</style>
</head>
<body>

<header>🛍 Sophie Store</header>

<div class="filtros">
<input type="text" id="buscador" placeholder="Buscar producto..." onkeyup="filtrar()">
<select id="filtroCategoria" onchange="filtrar()">
<option value="">Todas las categorías</option>
</select>
</div>

<div id="productos"></div>

<div class="espacio"></div>

<!-- CARRITO TIPO APP -->
<div class="carrito-app">
<div class="total">Total: S/. <span id="total">0.00</span></div>
<button class="btn-wsp" onclick="enviarPedido()">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
Confirmar pedido por WhatsApp
</button>
</div>

<script>

let urlCSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8uMFvOEq09EXVbg6YxPa1lhGndcrwD-ELRkxRQVsiG4Tjb646vPzGPcuHP4CD_EZ-F7da5BonXwt3/pub?gid=1913233787&single=true&output=csv";

let productos=[];
let carrito=[];

fetch(urlCSV)
.then(res=>res.text())
.then(data=>{

let filas=data.split("\n").slice(1);

filas.forEach((fila,index)=>{

let col=fila.split(",");

if(col.length>=9){

let descuento=parseFloat(col[8])||0;

let precioUnidad=parseFloat(col[2]);
let precioMayor=parseFloat(col[3]);

let precioUnidadFinal=precioUnidad-(precioUnidad*descuento/100);
let precioMayorFinal=precioMayor-(precioMayor*descuento/100);

let producto={
nombre:col[0],
marca:col[1],
precioUnidad:precioUnidadFinal,
precioMayor:precioMayorFinal,
precioUnidadOriginal:precioUnidad,
precioMayorOriginal:precioMayor,
minMayor:parseInt(col[4]),
imagen:col[5],
categoria:col[6],
codigo:col[7],
descuento:descuento
};

productos.push(producto);

if(!document.getElementById("filtroCategoria").innerHTML.includes(producto.categoria)){
document.getElementById("filtroCategoria").innerHTML+=
`<option value="${producto.categoria}">${producto.categoria}</option>`;
}

let etiquetaDescuento = descuento>0 
? `<div style="background:red;color:white;padding:3px 6px;border-radius:5px;font-size:12px;display:inline-block;">-${descuento}%</div>`
: "";

let precioHTML = descuento>0 
? `<div style="text-decoration:line-through;color:gray;">Unidad: S/. ${precioUnidad.toFixed(2)}</div>
   <div style="color:green;font-weight:bold;">Ahora: S/. ${precioUnidadFinal.toFixed(2)}</div>`
: `<div>Unidad: S/. ${precioUnidad.toFixed(2)}</div>`;

document.getElementById("productos").innerHTML+=`
<div class="producto" data-nombre="${producto.nombre.toLowerCase()}" data-cat="${producto.categoria}">
<img src="${producto.imagen}">
<div class="info">
<h3>${producto.nombre}</h3>
<div class="categoria">${producto.categoria} | Cod: ${producto.codigo}</div>
${etiquetaDescuento}
${precioHTML}
<div>Mayor desde ${producto.minMayor}: S/. ${precioMayorFinal.toFixed(2)}</div>
<input type="number" min="0" value="0" oninput="calcular(${index},this.value)">
</div>
</div>`;
}

});

});

function calcular(index,cantidad){
cantidad=parseInt(cantidad);

if(isNaN(cantidad)||cantidad<=0){
carrito[index]=null;
actualizarTotal();
return;
}

let p=productos[index];

let precio=cantidad>=p.minMayor?p.precioMayor:p.precioUnidad;
let subtotal=cantidad*precio;

carrito[index]={
nombre:p.nombre,
codigo:p.codigo,
cantidad:cantidad,
subtotal:subtotal
};

actualizarTotal();
}

function actualizarTotal(){
let total=0;
carrito.forEach(p=>{
if(p){ total+=p.subtotal; }
});
document.getElementById("total").innerText=total.toFixed(2);
}

function enviarPedido(){

let mensaje="Hola, quiero hacer este pedido:%0A%0A";
let total=0;

carrito.forEach(p=>{
if(p){
mensaje+=`${p.nombre} (Cod:${p.codigo}) x${p.cantidad} = S/. ${p.subtotal.toFixed(2)}%0A`;
total+=p.subtotal;
}
});

mensaje+=`%0ATotal: S/. ${total.toFixed(2)}`;

window.open("https://wa.me/51992044102?text="+mensaje);

}

function filtrar(){

let texto=document.getElementById("buscador").value.toLowerCase();
let categoria=document.getElementById("filtroCategoria").value;

let cards=document.querySelectorAll(".producto");

cards.forEach(card=>{
let nombre=card.getAttribute("data-nombre");
let cat=card.getAttribute("data-cat");

let mostrar=true;

if(texto && !nombre.includes(texto)){ mostrar=false; }
if(categoria && cat!=categoria){ mostrar=false; }

card.style.display=mostrar?"block":"none";
});

}

</script>

</body>
</html>
