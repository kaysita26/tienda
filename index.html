<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sophie Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f4f4f4;
}

/* HEADER */
header{
background:#6a0dad;
color:white;
display:flex;
align-items:center;
justify-content:center;
position:relative;
padding:12px;
}

header img{
position:absolute;
left:15px;
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
}

header h1{
margin:0;
font-size:24px;
font-weight:700;
}

/* FILTROS */
.filtros{
background:white;
padding:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

input,select{
padding:6px;
border-radius:8px;
border:1px solid #ccc;
font-family:'Poppins';
}

/* PRODUCTOS */
#productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:12px;
padding:12px;
}

.producto{
background:white;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
overflow:hidden;
display:flex;
flex-direction:column;
}

.producto img{
width:100%;
height:150px;
object-fit:contain;
background:white;
}

.info{
padding:8px;
}

.info h3{
margin:4px 0;
font-size:16px;
}

.categoria{
font-size:12px;
color:gray;
}

.precio{
font-weight:600;
font-size:14px;
}

.descuento{
color:red;
font-size:13px;
font-weight:600;
}

.precio-tachado{
text-decoration:line-through;
color:gray;
font-size:13px;
}

.btn-agregar{
margin-top:6px;
background:#6a0dad;
color:white;
border:none;
padding:6px;
border-radius:8px;
cursor:pointer;
width:100%;
font-size:13px;
}

/* CELULAR OPTIMIZADO */
@media(max-width:600px){

#productos{
grid-template-columns:1fr;
}

.producto{
flex-direction:row;
height:120px;
}

.producto img{
width:35%;
height:100%;
}

.info{
width:65%;
font-size:12px;
}

.btn-agregar{
font-size:12px;
padding:5px;
}

}

/* BOTÓN CARRITO */
.carrito-btn{
position:fixed;
bottom:15px;
right:15px;
background:#25D366;
color:white;
border:none;
padding:14px;
border-radius:50%;
font-size:20px;
cursor:pointer;
z-index:1000;
}

/* PANEL */
.carrito-panel{
position:fixed;
right:-100%;
top:0;
width:100%;
max-width:380px;
height:100%;
background:white;
box-shadow:-5px 0 15px rgba(0,0,0,0.2);
transition:0.4s;
padding:15px;
overflow-y:auto;
z-index:2000;
}

.carrito-panel.activo{
right:0;
}

.item-carrito{
border-bottom:1px solid #eee;
padding:6px 0;
display:flex;
justify-content:space-between;
font-size:13px;
}

.total{
font-size:18px;
font-weight:bold;
margin-top:10px;
}

.btn-confirmar{
background:#25D366;
color:white;
padding:8px;
border:none;
border-radius:8px;
margin-top:8px;
width:100%;
}

.btn-seguir{
background:#6a0dad;
color:white;
padding:6px;
border:none;
border-radius:8px;
margin-top:6px;
width:100%;
}

</style>
</head>
<body>

<header>
<img src="https://github.com/kaysita26/tienda/raw/main/imagenes/LOGO%20SOPHIE%20STORE.jpeg">
<h1>SOPHIE STORE</h1>
</header>

<div class="filtros">
<input type="text" id="buscar" placeholder="Buscar..." onkeyup="filtrar()">
<select id="categoria" onchange="filtrar()">
<option value="">Todas</option>
</select>
</div>

<div id="productos"></div>

<button class="carrito-btn" onclick="toggleCarrito()">🛒</button>

<div class="carrito-panel" id="carritoPanel">
<h2>Tu Pedido</h2>
<div id="listaCarrito"></div>
<div class="total">Total: S/. <span id="total">0.00</span></div>

<input type="text" id="nombreCliente" placeholder="Tu nombre">
<input type="tel" id="celCliente" placeholder="Tu celular">

<button class="btn-confirmar" onclick="confirmarPedido()">Confirmar Pedido</button>
<button class="btn-seguir" onclick="toggleCarrito()">Seguir comprando</button>
</div>

<script>

let urlCSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8uMFvOEq09EXVbg6YxPa1lhGndcrwD-ELRkxRQVsiG4Tjb646vPzGPcuHP4CD_EZ-F7da5BonXwt3/pub?gid=1913233787&single=true&output=csv";

let productos=[];
let carrito=[];

fetch(urlCSV)
.then(res=>res.text())
.then(data=>{
let filas=data.split("\n").slice(1);

filas.forEach((fila,index)=>{
let col=fila.split(",");

if(col.length>=8){

let descuento=parseFloat(col[7])||0;

let p={
nombre:col[0],
precioUnidad:parseFloat(col[2]),
precioMayor:parseFloat(col[3]),
minMayor:parseInt(col[4]),
imagen:col[5],
categoria:col[6],
descuento:descuento
};

productos.push(p);

let precioFinal=p.precioUnidad;
if(descuento>0){
precioFinal=p.precioUnidad-(p.precioUnidad*descuento/100);
}

document.getElementById("productos").innerHTML+=`
<div class="producto">
<img src="${p.imagen}">
<div class="info">
<h3>${p.nombre}</h3>
<div class="categoria">${p.categoria}</div>

${descuento>0?
`<div class="precio-tachado">S/. ${p.precioUnidad.toFixed(2)}</div>
<div class="descuento">${descuento}% OFF</div>
<div class="precio">S/. ${precioFinal.toFixed(2)}</div>`
:
`<div class="precio">S/. ${p.precioUnidad.toFixed(2)}</div>`
}

<input type="number" min="1" value="1" id="cant${index}">
<button class="btn-agregar" onclick="agregarCarrito(${index})">Agregar al carrito</button>
</div>
</div>`;
}
});
});

function agregarCarrito(index){

let cantidad=parseInt(document.getElementById("cant"+index).value);
let p=productos[index];

let precioBase=cantidad>=p.minMayor?p.precioMayor:p.precioUnidad;

if(p.descuento>0){
precioBase=precioBase-(precioBase*p.descuento/100);
}

let subtotal=cantidad*precioBase;

carrito.push({nombre:p.nombre,cantidad,subtotal});

actualizarCarrito();
}

function actualizarCarrito(){

let lista="";
let total=0;

carrito.forEach((p,i)=>{
total+=p.subtotal;
lista+=`<div class="item-carrito">${p.nombre} x${p.cantidad} - S/. ${p.subtotal.toFixed(2)}</div>`;
});

document.getElementById("listaCarrito").innerHTML=lista;
document.getElementById("total").innerText=total.toFixed(2);
}

function toggleCarrito(){
document.getElementById("carritoPanel").classList.toggle("activo");
}

function confirmarPedido(){
let nombre=document.getElementById("nombreCliente").value.trim();
let cel=document.getElementById("celCliente").value.trim();

if(nombre===""||cel===""){
alert("Ingresa nombre y celular");
return;
}

let mensaje=`Hola soy ${nombre}%0AMi número es ${cel}%0A%0APedido:%0A`;

let total=0;
carrito.forEach(p=>{
mensaje+=`- ${p.nombre} x${p.cantidad} = S/. ${p.subtotal.toFixed(2)}%0A`;
total+=p.subtotal;
});

mensaje+=`%0ATotal: S/. ${total.toFixed(2)}`;

window.open("https://wa.me/51992044102?text="+mensaje);
}

function filtrar(){
let texto=document.getElementById("buscar").value.toLowerCase();
let cards=document.querySelectorAll(".producto");

cards.forEach(card=>{
let nombre=card.innerText.toLowerCase();
card.style.display=nombre.includes(texto)?"flex":"none";
});
}

</script>

</body>
</html>
