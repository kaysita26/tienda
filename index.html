<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sophie Store</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f5f5f5;
  padding-bottom:90px;
}

header{
  background:#000;
  color:white;
  text-align:center;
  padding:15px;
}

header img{
  height:65px;
}

.controles{
  padding:10px;
  text-align:center;
}

input, select{
  padding:8px;
  margin:5px;
  border-radius:8px;
  border:1px solid #ccc;
}

.producto{
  display:flex;
  background:white;
  margin:10px;
  border-radius:12px;
  padding:10px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.producto img{
  width:110px;
  height:110px;
  object-fit:cover;
  border-radius:10px;
  margin-right:10px;
}

.info{
  flex:1;
}

.info h3{
  margin:0;
  font-size:18px;
}

.categoria{
  font-size:12px;
  color:gray;
}

.precio-original{
  text-decoration:line-through;
  color:gray;
  font-size:13px;
}

.precio-final{
  color:green;
  font-weight:bold;
}

.descuento{
  background:red;
  color:white;
  padding:3px 6px;
  border-radius:5px;
  font-size:12px;
  display:inline-block;
  margin-top:3px;
}

input[type="number"]{
  width:60px;
  margin-top:5px;
}

#carritoBarra{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#25D366;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
  cursor:pointer;
}

.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
}
</style>
</head>

<body>

<header>
  <img src="https://raw.githubusercontent.com/kaysita26/tienda/main/imagenes/LOGO%20SOPHIE%20STORE.jpeg">
  <h2>SOPHIE STORE</h2>
</header>

<div class="controles">
  <input type="text" id="buscador" placeholder="Buscar..." oninput="filtrar()">
  <select id="filtroCategoria" onchange="filtrar()">
    <option value="">Todas las categorías</option>
  </select>
</div>

<div id="productos"></div>

<div id="carritoBarra" onclick="abrirConfirmacion()">
  🛒 <span id="cantidadItems">0 ítems</span>
  <span id="totalCarrito">S/. 0.00</span>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Confirmar Pedido</h3>
    <div id="resumen"></div>
    <input type="text" id="nombreCliente" placeholder="Tu nombre">
    <input type="tel" id="celCliente" placeholder="Tu celular">
    <button onclick="enviarPedido()">Enviar a WhatsApp</button>
  </div>
</div>

<script>

let urlCSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8uMFvOEq09EXVbg6YxPa1lhGndcrwD-ELRkxRQVsiG4Tjb646vPzGPcuHP4CD_EZ-F7da5BonXwt3/pub?gid=1913233787&single=true&output=csv";

let productos=[];
let carrito=[];

fetch(urlCSV)
.then(res=>res.text())
.then(data=>{

let filas=data.split("\n").slice(1);
let categorias=[];

filas.forEach((fila,index)=>{

let col=fila.split(",");

if(col.length>=9){

let descuento=parseFloat(col[8])||0;
let precioUnidad=parseFloat(col[2]);
let precioMayor=parseFloat(col[3]);

let precioUnidadFinal=precioUnidad-(precioUnidad*descuento/100);
let precioMayorFinal=precioMayor-(precioMayor*descuento/100);

let producto={
nombre:col[0],
marca:col[1],
precioUnidad:precioUnidadFinal,
precioMayor:precioMayorFinal,
minMayor:parseInt(col[4]),
imagen:col[5],
categoria:col[6],
codigo:col[7],
descuento:descuento
};

productos.push(producto);

if(!categorias.includes(producto.categoria)){
categorias.push(producto.categoria);
document.getElementById("filtroCategoria").innerHTML+=
`<option value="${producto.categoria}">${producto.categoria}</option>`;
}

document.getElementById("productos").innerHTML+=`
<div class="producto" data-nombre="${producto.nombre.toLowerCase()}" data-cat="${producto.categoria}">
<img src="${producto.imagen}">
<div class="info">
<h3>${producto.nombre}</h3>
<div class="categoria">${producto.categoria} | Cod: ${producto.codigo}</div>
${descuento>0?`<div class="descuento">-${descuento}%</div>`:""}
${descuento>0?`<div class="precio-original">Unidad: S/. ${precioUnidad.toFixed(2)}</div>`:""}
<div class="precio-final">Unidad: S/. ${precioUnidadFinal.toFixed(2)}</div>
<div>Mayor desde ${producto.minMayor}: S/. ${precioMayorFinal.toFixed(2)}</div>
<input type="number" min="0" value="0" oninput="calcular(${index},this.value)">
</div>
</div>`;
}

});

});

function filtrar(){
let texto=document.getElementById("buscador").value.toLowerCase();
let cat=document.getElementById("filtroCategoria").value;

document.querySelectorAll(".producto").forEach(p=>{
let nombre=p.dataset.nombre;
let categoria=p.dataset.cat;
let mostrar=nombre.includes(texto)&&(cat==""||categoria==cat);
p.style.display=mostrar?"flex":"none";
});
}

function calcular(index,cantidad){
cantidad=parseInt(cantidad);

if(isNaN(cantidad)||cantidad<=0){
carrito[index]=null;
actualizarCarrito();
return;
}

let p=productos[index];
let precio=cantidad>=p.minMayor?p.precioMayor:p.precioUnidad;
let subtotal=cantidad*precio;

carrito[index]={nombre:p.nombre,codigo:p.codigo,cantidad:cantidad,subtotal:subtotal};
actualizarCarrito();
}

function actualizarCarrito(){
let total=0;
let items=0;

carrito.forEach(p=>{
if(p){
total+=p.subtotal;
items+=p.cantidad;
}
});

document.getElementById("cantidadItems").innerText=items+" ítems";
document.getElementById("totalCarrito").innerText="S/. "+total.toFixed(2);
}

function abrirConfirmacion(){
let resumen="";
let total=0;

carrito.forEach(p=>{
if(p){
resumen+=`${p.nombre} (Cod:${p.codigo}) x${p.cantidad} = S/. ${p.subtotal.toFixed(2)}<br>`;
total+=p.subtotal;
}
});

if(total==0){alert("No seleccionaste productos");return;}

resumen+=`<strong>Total: S/. ${total.toFixed(2)}</strong>`;
document.getElementById("resumen").innerHTML=resumen;
document.getElementById("modal").style.display="flex";
}

function enviarPedido(){

let nombre=document.getElementById("nombreCliente").value;
let cel=document.getElementById("celCliente").value;

if(nombre==""||cel==""){
alert("Completa nombre y celular");
return;
}

let mensaje=`Hola, soy ${nombre}.%0AMi celular: ${cel}%0A%0APedido:%0A`;

let total=0;

carrito.forEach(p=>{
if(p){
mensaje+=`${p.nombre} (Cod:${p.codigo}) x${p.cantidad} = S/. ${p.subtotal.toFixed(2)}%0A`;
total+=p.subtotal;
}
});

mensaje+=`%0ATotal: S/. ${total.toFixed(2)}`;

window.open("https://wa.me/51992044102?text="+mensaje);

location.reload();

}

</script>

</body>
</html>
